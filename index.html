
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#006400">
<title>Yamba Muno - Fundraising Uganda</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial}
body{background:#f5f7fa;color:#333;-webkit-font-smoothing:antialiased}
header{background:#006400;color:white;padding:12px;text-align:center;position:sticky;top:0;z-index:10}
header h1{font-size:20px} .admin-icon{position:absolute;left:12px;top:10px;background:none;border:none;font-size:22px;cursor:pointer;color:white}
.container{max-width:700px;margin:10px auto;padding:10px}
.card{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
input,textarea,select{width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;background:#fff}
button{background:#006400;color:white;padding:14px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;width:100%;font-size:16px;margin-top:8px}
button:active{transform:scale(0.98)}
button.danger{background:#d32f2f} button.warn{background:#ff9800} button.donate{background:#ff9800} 
button.mtn{background:#ffcc00;color:#000} button.airtel{background:#e60000} button.stripe{background:#635bff} 
button.whatsapp{background:#25D366}
.hidden{display:none} img{max-width:100%;border-radius:8px;margin:10px 0}
.progress{height:18px;background:#eee;border-radius:8px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;background:#006400;text-align:center;color:white;font-size:11px;line-height:18px}
.note{background:#fff3cd;border-left:3px solid #ffc107;padding:10px;border-radius:6px;font-size:13px;margin:10px 0}
.fee-box{background:#e3f2fd;border-left:3px solid #2196f3;padding:10px;border-radius:6px;font-size:13px;margin:10px 0}
.breakdown{background:#f1f8e9;padding:10px;border-radius:6px;font-size:13px}
.payment-box{border:1px dashed #006400;padding:12px;border-radius:8px;background:#e8f5e9;margin:10px 0}
.proof-item{border-left:3px solid #ff9800;padding:10px;background:#fff3cd;margin:8px 0;border-radius:5px;font-size:13px}
.method-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.checkbox-group{display:flex;align-items:start;gap:8px;margin:12px 0;padding:10px;background:#f5f5f5;border-radius:6px;font-size:13px}
.checkbox-group input{width:18px;height:18px;margin:2px 0 0 0}
.loading{text-align:center;padding:30px;font-size:16px;color:#006400}
footer{text-align:center;padding:15px;font-size:12px;color:#666}
.error{color:#d32f2f;text-align:center;padding:15px;background:#ffebee;border-radius:8px}
</style>
</head>
<body>
<header><button class="admin-icon" onclick="showAdminLogin()">💚</button><div><h1>YAMBA MUNO</h1><p style="font-size:12px">100% Transparent Fundraising</p></div></header>
<div class="container"><div id="app"><div class="loading">Loading...</div></div><div id="dashboard" class="hidden"></div><div id="admin" class="hidden"></div></div>

<footer>
  <a href="https://wa.me/256780420041" target="_blank"><button class="whatsapp">💬 WhatsApp: +256780420041</button></a>
  <p style="margin-top:8px">© 2026 Yamba Muno</p>
</footer>

<script>
// Show UI immediately so it never gets stuck
showAuthPage();

// Load Firebase in background
let db, users={},fundraisers={},donations={},proofs={};
let currentUser=JSON.parse(sessionStorage.getItem('ym_current'))||null;

const ADMIN_EMAIL="admin@yambamuno.com"; const ADMIN_PASS="Kalungi123"; const ADMIN_NAME="Lubinga Alosious";
const SERVICE_FEE=5000; const PLATFORM_PERCENT=9;
const ADMIN_MTN="+256788417769"; const ADMIN_AIRTEL="+256743830346";
const STRIPE_LINK="https://buy.stripe.com/8x214o2awd8l8ym7PhfjG00";
const SUPPORT_WHATSAPP="https://wa.me/256780420041";

// Load Firebase with timeout
setTimeout(loadFirebase, 100);

async function loadFirebase(){
  try{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js");
    const { getDatabase, ref, set, get, update, remove } = await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js");
    const firebaseConfig = {apiKey:"AIzaSyApNYOw-a9w7m51JCCOhP0EVRiVyx5JPrw",databaseURL:"https://yamba-muno-default-rtdb.firebaseio.com",projectId:"yamba-muno",appId:"1:507076898780:web:c742dfcadbe635a568a919"};
    const app = initializeApp(firebaseConfig); db = getDatabase(app);
    
    const [u,f,d,p]=await Promise.all([get(ref(db,'users')),get(ref(db,'fundraisers')),get(ref(db,'donations')),get(ref(db,'proofs'))]);
    users=u.val()||{}; fundraisers=f.val()||{}; donations=d.val()||{}; proofs=p.val()||{};
    
    const urlParams=new URLSearchParams(window.location.search);
    if(urlParams.has('fund')){showPublicPage(urlParams.get('fund'));}
    else if(currentUser){currentUser.id==="admin"?showAdmin():showDashboard();}
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="error">No internet. Please check connection and refresh.<br><button onclick="location.reload()">Retry</button></div>`
  }
}

function saveSession(user){currentUser=user;sessionStorage.setItem('ym_current',JSON.stringify(user));}
function formatPhone(n){return"+256"+n.replace(/\D/g,'').slice(-9);}

function showAuthPage(){
  document.getElementById('app').innerHTML=`<div class="card"><h2>Start Your Fundraiser</h2><input id="authName" placeholder="Full Names" autocomplete="name"><div style="display:flex"><div style="padding:14px;background:#eee;border-radius:8px 0 0 8px">+256</div><input id="authPhone" placeholder="788417769" maxlength="9" inputmode="numeric" style="border-radius:0 8px 8px 0"></div><input id="authPass" type="password" placeholder="Password"><button onclick="signup()">Create Account</button><button onclick="login()" style="background:#555">Login</button></div>`;
}

window.showAdminLogin=function(){const e=prompt("Admin Email:"),p=prompt("Password:"); if(e==ADMIN_EMAIL&&p==ADMIN_PASS){saveSession({name:"Admin",id:"admin"});showAdmin();}else if(e)alert("Wrong login");}

window.signup=async function(){
  if(!authName.value||!authPhone.value||!authPass.value)return alert("Fill all fields");
  if(!db)return alert("Still connecting... please wait 2s and try again");
  const id=Date.now().toString();await set(ref(db,'users/'+id),{name:authName.value,phone:formatPhone(authPhone.value),pass:authPass.value,id});
  alert("Account Created"); location.reload();
}

window.login=async function(){
  if(!db)return alert("Still connecting... please wait 2s and try again");
  const phone=formatPhone(authPhone.value);
  let user=Object.values(users).find(u=>u.phone==phone&&u.pass==authPass.value); 
  if(!user)return alert("Wrong phone or password"); 
  saveSession(user);showDashboard();
}

window.showDashboard=function(){
  document.getElementById('app').classList.add('hidden');document.getElementById('admin').classList.add('hidden');document.getElementById('dashboard').classList.remove('hidden');
  let myFund=Object.values(fundraisers).find(f=>f.userId==currentUser.id);
  let myDons=Object.values(donations).filter(d=>d.fundId==myFund?.id);
  let myProofs=Object.values(proofs).filter(p=>p.fundId==myFund?.id);
  let gross=myDons.reduce((a,b)=>a+b.amount,0); let platformFee=Math.round(gross*PLATFORM_PERCENT/100); let net=gross-platformFee;

  let section="";
  if(myFund&&myFund.status=="pending"){
    section=`<div class="card"><h3>Step 2: Pay ${SERVICE_FEE.toLocaleString()} UGX Activation</h3><div class="note"><b>Transparency:</b> 9% fee. You get 91%.</div><input id="proofText" placeholder="Payment Reference"><button onclick="submitProof('${myFund.id}','activation')">Submit Proof</button></div>`;
  }
  if(myFund&&myFund.status=="approved"){
    const link=window.location.origin+window.location.pathname+"?fund="+myFund.id;
    section=`<div class="card"><h3>✅ LIVE</h3><input value="${link}" readonly><button onclick="navigator.clipboard.writeText('${link}')">Copy Link</button></div>
    <div class="card"><h3>📊 Earnings</h3><div class="breakdown"><p>Total: <b>${gross.toLocaleString()} UGX</b></p><p>Fee 9%: <b>-${platformFee.toLocaleString()} UGX</b></p><p style="color:#006400">You Get: <b>${net.toLocaleString()} UGX</b></p></div>${myDons.map(d=>`<p>${d.name}: ${d.amount.toLocaleString()} UGX</p>`).join('')||'<p>No donations</p>'}</div>
    <div class="card"><h3>📥 Proofs</h3>${myProofs.map(p=>`<div class="proof-item"><b>${p.donorName}</b> - ${p.amount.toLocaleString()} UGX<br><b>Ref:</b> ${p.proof}</div>`).join('')||'<p>No proofs</p>'}</div>`;
  }

  document.getElementById('dashboard').innerHTML=`<div class="card"><h2>Hi ${currentUser.name}</h2><button class="danger" onclick="logout()">Logout</button></div>${!myFund?`<div class="card"><h3>Create Fundraiser</h3><input id="fundTitle" placeholder="What for?"><input id="fundTarget" type="number" placeholder="Target UGX" inputmode="numeric"><textarea id="fundStory" placeholder="Your story..." rows="3"></textarea><input id="fundMedia" type="file" accept="image/*"><select id="payoutMethod" onchange="showPayout()"><option value="">Payout Method</option><option value="MTN">MTN</option><option value="Airtel">Airtel</option><option value="Bank">Bank</option></select><div id="payoutFields"></div>
  <div class="checkbox-group"><input type="checkbox" id="agreeTerms"><label for="agreeTerms"><b>I authorize Yamba Muno</b> to collect funds. 9% fee applies.</label></div>
  <button onclick="saveFundraiser()">Save & Continue</button></div>`:section}`;
}

window.showPayout=function(){const m=payoutMethod.value; payoutFields.innerHTML=m=="MTN"||m=="Airtel"?`<div style="display:flex"><div style="padding:14px;background:#eee;border-radius:8px 0 0 8px">${m}</div><input id="payoutNumber" maxlength="9" placeholder="788417769" inputmode="numeric" style="border-radius:0 8px 8px 0"></div>`:m=="Bank"?`<input id="bankName" placeholder="Bank"><input id="bankHolder" placeholder="Account Name"><input id="bankAccount" placeholder="Account Number">`:"";}

window.saveFundraiser=async function(){
  if(!document.getElementById('agreeTerms').checked) return alert("You must agree to terms");
  if(!fundTitle.value||!fundTarget.value) return alert("Fill title and target");
  const file=fundMedia.files[0];let media=""; if(file){media=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(file);});}
  const id=Date.now().toString(); const m=payoutMethod.value; let pd=m=="Bank"?{bankName:bankName.value,bankHolder:bankHolder.value,bankAccount:bankAccount.value}:{number:formatPhone(payoutNumber.value)};
  await set(ref(db,'fundraisers/'+id),{id,userId:currentUser.id,title:fundTitle.value,target:+fundTarget.value,story:fundStory.value,media,payoutMethod:m,payoutDetails:pd,agreed:true,status:"pending",proof:""});
  alert("Saved! Pay activation fee"); location.reload();
}

window.submitProof=async function(id,type){const proofText=document.getElementById('proofText').value; if(!proofText)return alert("Enter reference");
  await set(ref(db,'proofs/'+Date.now()),{fundId:id,donorName:currentUser?.name,amount:0,method:"Activation",proof:proofText,date:Date.now(),type});
  await update(ref(db,'fundraisers/'+id),{proof:proofText}); alert("Proof Sent"); location.reload();
}

window.showPublicPage=function(fid){
  const f=fundraisers[fid]; if(!f||f.status!="approved")return document.getElementById('app').innerHTML="<div class='card'><h2>Not Found</h2></div>";
  let raised=Object.values(donations).filter(d=>d.fundId==f.id).reduce((a,b)=>a+b.amount,0); let pct=Math.min(100,Math.round(raised/f.target*100));
  document.getElementById('app').innerHTML=`<div class="card"><h2>${f.title}</h2>${f.media?`<img src="${f.media}">`:""}<p>${f.story}</p><h3>Goal: ${f.target.toLocaleString()} UGX</h3><div class="progress"><div class="progress-bar" style="width:${pct}%">${pct}%</div></div>
  <div class="fee-box">91% to ${users[f.userId]?.name}. 9% platform fee.</div>
  <button class="donate" onclick="donateForm.classList.toggle('hidden')">💚 Donate</button>
  <div id="donateForm" class="hidden"><input id="donorName" placeholder="Your Names"><input id="donorAmount" type="number" placeholder="Amount UGX" inputmode="numeric">
  <div class="method-grid"><button class="stripe" onclick="showStripePay('${f.title}')">Stripe</button><button class="mtn" onclick="showManualPay('MTN','${f.title}')">MTN</button><button class="airtel" onclick="showManualPay('Airtel','${f.title}')">Airtel</button></div><div id="manualPayBox"></div></div></div>`;
}

window.showStripePay=function(title){manualPayBox.innerHTML=`<div class="payment-box"><h3>Pay with Stripe</h3><button onclick="window.open('${STRIPE_LINK}','_blank')">Pay Now</button><input id="donateMethod" value="Stripe" type="hidden"><input id="donorProof" placeholder="Transaction ID"><button onclick="processDonate('${title}')">Submit Proof</button></div>`;}
window.showManualPay=function(method,title){const number=method=="MTN"?ADMIN_MTN:ADMIN_AIRTEL; manualPayBox.innerHTML=`<div class="payment-box"><h3>Send ${method} to:</h3><h2 style="color:#006400">${number}</h2><p><b>Name:</b> ${ADMIN_NAME}</p><p><b>Reference:</b> Donation to ${title}</p><input id="donateMethod" value="${method}" type="hidden"><input id="donorProof" placeholder="Transaction ID"><button onclick="processDonate('${title}')">Submit Proof</button></div>`;}
window.processDonate=async function(title){const name=donorName.value; const amt=+donorAmount.value; const proof=donorProof.value; const method=donateMethod.value; if(!name||!amt||!proof)return alert("Fill all"); const fid=Object.values(fundraisers).find(f=>f.title==title).id; await set(ref(db,'proofs/'+Date.now()),{fundId:fid,donorName:name,amount:amt,method,proof,date:Date.now(),type:"donation"}); document.getElementById('app').innerHTML=`<div class="card" style="background:#e8f5e9"><h2>🙏 Thank You ${name}!</h2><p>Donation recorded. We will verify.</p></div>`;}

window.showAdmin=function(){
  document.getElementById('app').classList.add('hidden');document.getElementById('dashboard').classList.add('hidden');document.getElementById('admin').classList.remove('hidden');
  let html=`<h2>🔒 Admin</h2><div class="card"><p><b>MTN:</b> ${ADMIN_MTN}</p><p><b>Airtel:</b> ${ADMIN_AIRTEL}</p></div><h3>Pending Proofs</h3>`;
  Object.values(proofs).filter(p=>p.type=="donation").forEach(p=>{let f=fundraisers[p.fundId]; html+=`<div class="proof-item"><h4>${p.donorName} - ${p.amount.toLocaleString()} UGX</h4><p>Ref: ${p.proof}</p><button class="warn" onclick="approveDonation('${p.fundId}','${p.donorName}',${p.amount},'${p.method}')">Approve</button></div>`});
  html+=`<h3>Pending Activations</h3>`;
  Object.values(fundraisers).filter(f=>f.status=="pending"&&f.proof).forEach(f=>{html+=`<div class="card"><h4>${f.title}</h4><p>Proof: ${f.proof}</p><button onclick="approveFund('${f.id}')">Approve</button></div>`});
  document.getElementById('admin').innerHTML=html+`<button onclick="logout()">Logout</button>`;
}
window.approveDonation=async function(fid,name,amt,method){await set(ref(db,'donations/'+Date.now()),{fundId:fid,name,amount:amt,method,date:Date.now()}); alert("Approved"); location.reload();}
window.approveFund=async function(id){await update(ref(db,'fundraisers/'+id),{status:"approved"});alert("Approved");location.reload();}
window.logout=function(){currentUser=null;sessionStorage.clear();location.reload();}
</script>
</body></html>
