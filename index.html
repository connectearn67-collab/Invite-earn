<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamba Muno - Fundraising Uganda</title>
<meta property="og:title" content="Yamba Muno - Help Ugandans Fundraise">
<meta property="og:description" content="Create a fundraiser and get donations via MTN, Airtel, Bank">
<meta property="og:image" content="https://connectearn67-collab.github.io/Referral-earning-/logo.jpg">

<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
  body{background:#f5f7fa;color:#333}
  header{background:#006400;color:white;padding:15px;text-align:center}
  header h1{font-size:24px}
.admin-banner{width:100%;max-height:250px;object-fit:cover;margin-bottom:15px;border-radius:10px}
.container{max-width:900px;margin:20px auto;padding:20px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
  button{background:#006400;color:white;padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
  button:hover{background:#004d00}
  button.danger{background:#cc0000}
.btn-mtn{background:#ffcc00;color:#000}
.btn-airtel{background:#e60000}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
  img,video{max-width:100%;border-radius:10px;margin:10px 0}
.hidden{display:none}
.progress{height:20px;background:#eee;border-radius:10px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;background:#006400;text-align:center;color:white;font-size:12px;line-height:20px}
</style>
</head>
<body>
<header>
  <h1>💚 YAMBA MUNO</h1>
  <p>Help Ugandans Fundraise For Their Cause</p>
</header>

<div class="container">
  <!-- ADMIN BANNER SHOWS HERE FOR EVERYONE -->
  <img id="adminBanner" class="admin-banner hidden">
  <div id="app"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('ym_users')) || [];
let fundraisers = JSON.parse(localStorage.getItem('ym_funds')) || [];
let donations = JSON.parse(localStorage.getItem('ym_donations')) || [];
let settings = JSON.parse(localStorage.getItem('ym_settings')) || {banner:""};
let currentUser = JSON.parse(localStorage.getItem('ym_current')) || null;
const ADMIN_PHONE = "+256788417769";

// SHOW BANNER IF ADMIN UPLOADED ONE
if(settings.banner){
  adminBanner.src = settings.banner;
  adminBanner.classList.remove('hidden');
}

function saveAll(){
  localStorage.setItem('ym_users', JSON.stringify(users));
  localStorage.setItem('ym_funds', JSON.stringify(fundraisers));
  localStorage.setItem('ym_donations', JSON.stringify(donations));
  localStorage.setItem('ym_settings', JSON.stringify(settings));
  localStorage.setItem('ym_current', JSON.stringify(currentUser));
}

const urlParams = new URLSearchParams(window.location.search);
if(urlParams.has('fund')){
  showPublicPage(parseInt(urlParams.get('fund')));
}else{
  showAuthPage();
}

// AUTH PAGE
function showAuthPage(){
  app.innerHTML = `
  <div class="card">
    <h2>Create Account or Login</h2>
    <input id="authName" placeholder="Full Names">
    <input id="authPhone" placeholder="Phone +2567...">
    <input id="authPass" type="password" placeholder="Password">
    <button onclick="signup()">1. Sign Up - Pay 5000 UGX</button>
    <button onclick="login()" style="background:#555">2. Login</button>
  </div>
  <div id="paymentSection" class="card hidden">
    <h2>Pay 5000 UGX to Activate</h2>
    <p>Send to: <b>MTN: +256788417769</b> or <b>Airtel: +256780420041</b><br>Names: <b>Lubinga Alosious</b></p>
    <button class="btn-mtn" onclick="markPaid()">I Have Paid - Activate My Link</button>
  </div>
  <div id="dashboard" class="hidden"></div>
  <div id="admin" class="hidden"></div>
  `;
}

function signup(){
  const name = authName.value; const phone = authPhone.value; const pass = authPass.value;
  if(!name ||!phone ||!pass) return alert("Fill all fields");
  if(users.find(u=>u.phone==phone)) return alert("User exists");
  users.push({name, phone, pass, paid:false, id:Date.now()});
  saveAll(); alert("Account created. Now pay 5000 UGX to activate");
  paymentSection.classList.remove('hidden');
}
function login(){
  const phone = authPhone.value; const pass = authPass.value;
  let user = users.find(u=>u.phone==phone && u.pass==pass);
  if(!user) return alert("Wrong details");
  currentUser = user; saveAll();
  if(phone==ADMIN_PHONE) showAdmin();
  else if(user.paid) showDashboard();
  else paymentSection.classList.remove('hidden');
}
function markPaid(){
  currentUser.paid = true;
  users = users.map(u=> u.phone==currentUser.phone? currentUser : u);
  saveAll(); showDashboard();
}

// USER DASHBOARD
function showDashboard(){
  dashboard.classList.remove('hidden');
  const link = window.location.origin + window.location.pathname + "?fund=" + currentUser.id;
  dashboard.innerHTML = `
    <div class="card">
      <h2>Welcome, ${currentUser.name}</h2>
      <p><b>Your Fundraising Link:</b></p>
      <input id="userLink" value="${link}" readonly>
      <button onclick="navigator.clipboard.writeText(document.getElementById('userLink').value)">📋 Copy Link</button>
    </div>
    <div class="card">
      <h3>Create New Fundraiser</h3>
      <input id="fundTitle" placeholder="What are you fundraising for?">
      <input id="fundTarget" type="number" placeholder="Target Amount UGX e.g 2000000">
      <textarea id="fundStory" placeholder="Tell your story / problem"></textarea>
      <input id="fundMedia" type="file" accept="image/*,video/*">
      <h4>Your Bank Details</h4>
      <input id="bankName" placeholder="Bank Name">
      <input id="bankHolder" placeholder="Names Registered">
      <input id="swiftCode" placeholder="SWIFT Code">
      <h4>Mobile Money</h4>
      <input id="mtnNumber" placeholder="MTN Number">
      <input id="airtelNumber" placeholder="Airtel Number">
      <button onclick="saveFundraiser()">Save Fundraiser & Generate Link</button>
    </div>
    <div class="card"><h3>My Fundraisers</h3><div id="myFundraisers"></div></div>
  `;
  loadMyFundraisers();
}

function saveFundraiser(){
  const file = fundMedia.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    fundraisers.push({
      id:Date.now(), userId:currentUser.id, title:fundTitle.value, target:parseInt(fundTarget.value),
      story:fundStory.value, media:e.target.result, bankName:bankName.value, bankHolder:bankHolder.value,
      swift:swiftCode.value, mtn:mtnNumber.value, airtel:airtelNumber.value
    });
    saveAll(); alert("Fundraiser Created!"); loadMyFundraisers();
  }
  if(file) reader.readAsDataURL(file);
}

function loadMyFundraisers(){
  myFundraisers.innerHTML = "";
  fundraisers.filter(f=>f.userId==currentUser.id).forEach(f=>{
    let raised = donations.filter(d=>d.fundId==f.id).reduce((a,b)=>a+b.amount,0);
    myFundraisers.innerHTML += `<div class="card">
      <h4>${f.title}</h4>
      <p>Raised: ${raised.toLocaleString()} / ${f.target.toLocaleString()} UGX</p>
      <button class="danger" onclick="deleteFund(${f.id})">Delete</button>
    </div>`;
  });
}

// ADMIN PANEL WITH BANNER UPLOAD
function showAdmin(){
  admin.classList.remove('hidden');
  admin.innerHTML = `
  <h2>🔒 Admin Panel</h2>
  <div class="card">
    <h3>Upload Banner Image - Shows to All Users</h3>
    <input id="bannerUpload" type="file" accept="image/*">
    <button onclick="uploadBanner()">Upload Banner</button>
    <button class="danger" onclick="removeBanner()">Remove Banner</button>
  </div>
  <div id="allFunds"></div>
  <button onclick="logout()">Logout</button>
  `;
  loadAllFunds();
}

function uploadBanner(){
  const file = bannerUpload.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    settings.banner = e.target.result;
    saveAll();
    adminBanner.src = settings.banner;
    adminBanner.classList.remove('hidden');
    alert("Banner Updated! All users will now see it");
  }
  if(file) reader.readAsDataURL(file);
}

function removeBanner(){
  settings.banner = "";
  saveAll();
  adminBanner.classList.add('hidden');
  alert("Banner Removed");
}

function loadAllFunds(){
  allFunds.innerHTML = "";
  fundraisers.forEach(f=>{
    let total = donations.filter(d=>d.fundId==f.id).reduce((a,b)=>a+b.amount,0);
    allFunds.innerHTML += `<div class="card">
      <h4>${f.title} - ${total.toLocaleString()} / ${f.target.toLocaleString()} UGX</h4>
      <p>By: ${users.find(u=>u.id==f.userId)?.name}</p>
      <button class="danger" onclick="deleteFund(${f.id})">Delete</button>
    </div>`;
  });
}

// PUBLIC PAGE
function showPublicPage(fundId){
  const f = fundraisers.find(x=>x.userId==fundId);
  if(!f) return app.innerHTML = "<h2>Fundraiser Not Found</h2>";

  let raised = donations.filter(d=>d.fundId==f.id).reduce((a,b)=>a+b.amount,0);
  let percent = Math.min(100, Math.round(raised/f.target*100));
  let donorHTML = donations.filter(d=>d.fundId==f.id).map(d=>`<p>${d.name} - ${d.amount.toLocaleString()} UGX via ${d.method}</p>`).join("");

  app.innerHTML = `
  <div class="card">
    <h2>${f.title}</h2>
    ${f.media.startsWith('data:video')? `<video controls src="${f.media}"></video>` : `<img src="${f.media}">`}
    <p>${f.story}</p>
    <h4>Target: ${f.target.toLocaleString()} UGX</h4>
    <div class="progress"><div class="progress-bar" style="width:${percent}%">${percent}%</div></div>
    <h4>Raised: ${raised.toLocaleString()} UGX</h4>

    <h3>Donate Now</h3>
    <input id="donorName" placeholder="Your Full Names">
    <input id="donorAmount" type="number" placeholder="How much do you want to donate? UGX">
    <div class="grid">
      <button class="btn-mtn" onclick="donate('MTN', ${f.id})">Donate via MTN: ${f.mtn}</button>
      <button class="btn-airtel" onclick="donate('Airtel', ${f.id})">Donate via Airtel: ${f.airtel}</button>
    </div>
    <button onclick="document.getElementById('bank').classList.toggle('hidden')" style="background:#0047ab;margin-top:10px">Donate via Bank</button>
    <div id="bank" class="hidden"><p>Bank: ${f.bankName}<br>Holder: ${f.bankHolder}<br>SWIFT: ${f.swift}</p></div>

    <h4>Donors So Far</h4>
    <div>${donorHTML || "No donations yet"}</div>
  </div>`;
}

function donate(method, fundId){
  const name = donorName.value; const amount = parseInt(donorAmount.value);
  if(!name ||!amount) return alert("Enter name and amount");
  donations.push({fundId, name, amount, method, date:new Date()});
  saveAll();
  const f = fundraisers.find(x=>x.id==fundId);
  alert(`Send ${amount.toLocaleString()} UGX to ${method}: ${f[method.toLowerCase()]}`);
  showPublicPage(f.userId);
}

function deleteFund(id){
  if(!confirm("Delete this fundraiser?")) return;
  fundraisers = fundraisers.filter(f=>f.id!=id);
  donations = donations.filter(d=>d.fundId!=id);
  saveAll(); location.reload();
}

function logout(){ currentUser=null; saveAll(); location.reload(); }
</script>
</body>
</html>
