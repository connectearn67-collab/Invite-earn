
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamba Muno - Transparent Fundraising Uganda</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
body{background:#f5f7fa;color:#333} header{background:#006400;color:white;padding:15px;text-align:center;position:relative}
header h1{font-size:22px}.admin-icon{position:absolute;left:15px;top:15px;background:none;border:none;font-size:24px;cursor:pointer;color:white}
.container{max-width:900px;margin:20px auto;padding:15px}.card{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{background:#006400;color:white;padding:14px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;width:100%;font-size:16px;margin-top:8px}
button.danger{background:#cc0000} button.warn{background:#ff9800} button.donate{background:#ff9800} button.mtn{background:#ffcc00;color:#000} button.airtel{background:#e60000} button.stripe{background:#635bff} button.whatsapp{background:#25D366}
.hidden{display:none} img{max-width:100%;border-radius:10px;margin:10px 0}
.progress{height:22px;background:#eee;border-radius:10px;overflow:hidden;margin:10px 0}.progress-bar{height:100%;background:#006400;text-align:center;color:white;font-size:12px;line-height:22px}
.note{background:#fff3cd;border-left:4px solid #ffc107;padding:12px;border-radius:8px;font-size:13px;margin:10px 0}
.fee-box{background:#e3f2fd;border-left:4px solid #2196f3;padding:12px;border-radius:8px;font-size:14px;margin:10px 0}
.breakdown{background:#f1f8e9;padding:10px;border-radius:8px;font-size:13px}
.payment-box{border:2px dashed #006400;padding:15px;border-radius:10px;background:#e8f5e9;margin:10px 0}
.proof-item{border-left:4px solid #ff9800;padding:10px;background:#fff3cd;margin:8px 0;border-radius:5px}
.method-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.checkbox-group{display:flex;align-items:start;gap:10px;margin:15px 0;padding:12px;background:#f5f5f5;border-radius:8px}
.checkbox-group input{width:20px;height:20px;margin:0}
footer{text-align:center;padding:20px;font-size:12px;color:#666}
</style>
</head>
<body>
<header><button class="admin-icon" onclick="showAdminLogin()">💚</button><div><h1>YAMBA MUNO</h1><p>100% Transparent Fundraising</p></div></header>
<div class="container"><div id="app"><div>Loading...</div></div><div id="dashboard" class="hidden"></div><div id="admin" class="hidden"></div></div>

<footer>
  <p>Need Help?</p>
  <a href="https://wa.me/256780420041" target="_blank"><button class="whatsapp">💬 WhatsApp Customer Care: +256780420041</button></a>
  <p style="margin-top:10px">© 2026 Yamba Muno. All rights reserved.</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, get, update, remove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {apiKey:"AIzaSyApNYOw-a9w7m51JCCOhP0EVRiVyx5JPrw",databaseURL:"https://yamba-muno-default-rtdb.firebaseio.com",projectId:"yamba-muno",appId:"1:507076898780:web:c742dfcadbe635a568a919"};
  const app = initializeApp(firebaseConfig); const db = getDatabase(app);

  const ADMIN_EMAIL="admin@yambamuno.com"; const ADMIN_PASS="Kalungi123"; const ADMIN_NAME="Lubinga Alosious";
  const SERVICE_FEE=5000; const PLATFORM_PERCENT=9;
  const ADMIN_MTN="+256788417769"; const ADMIN_AIRTEL="+256743830346";
  const STRIPE_LINK="https://buy.stripe.com/8x214o2awd8l8ym7PhfjG00";
  const SUPPORT_WHATSAPP="https://wa.me/256780420041";

  let currentUser=JSON.parse(sessionStorage.getItem('ym_current'))||null; let users={},fundraisers={},donations={},proofs={};

  async function loadAllData(){
    const [u,f,d,p]=await Promise.all([get(ref(db,'users')),get(ref(db,'fundraisers')),get(ref(db,'donations')),get(ref(db,'proofs'))]);
    users=u.val()||{}; fundraisers=f.val()||{}; donations=d.val()||{}; proofs=p.val()||{};
    const urlParams=new URLSearchParams(window.location.search);
    if(urlParams.has('fund')){showPublicPage(urlParams.get('fund'));}
    else if(currentUser){currentUser.id==="admin"?showAdmin():showDashboard();} else{showAuthPage();}
  } loadAllData();
  function saveSession(user){currentUser=user;sessionStorage.setItem('ym_current',JSON.stringify(user));}

  function showAuthPage(){document.getElementById('app').innerHTML=`<div class="card"><h2>Start Your Fundraiser</h2><input id="authName" placeholder="Full Names"><div style="display:flex"><div style="padding:12px;background:#eee">+256</div><input id="authPhone" placeholder="788417769" maxlength="9"></div><input id="authPass" type="password" placeholder="Password"><button onclick="signup()">Create</button><button onclick="login()" style="background:#555">Login</button><a href="${SUPPORT_WHATSAPP}" target="_blank"><button class="whatsapp">💬 Need Help? Chat Support</button></a></div>`;}
  window.showAdminLogin=function(){const e=prompt("Admin Email:"),p=prompt("Password:"); if(e==ADMIN_EMAIL&&p==ADMIN_PASS){saveSession({name:"Admin",id:"admin"});showAdmin();}else alert("Wrong");}
  function formatPhone(n){return"+256"+n.replace(/\D/g,'').slice(-9);}
  window.signup=async function(){const id=Date.now().toString();await set(ref(db,'users/'+id),{name:authName.value,phone:formatPhone(authPhone.value),pass:authPass.value,id});alert("Created");loadAllData();}
  window.login=async function(){const phone=formatPhone(authPhone.value);let user=Object.values(users).find(u=>u.phone==phone&&u.pass==authPass.value); if(!user)return alert("Wrong"); saveSession(user);showDashboard();}

  window.showDashboard=function(){
    document.getElementById('app').classList.add('hidden');document.getElementById('admin').classList.add('hidden');document.getElementById('dashboard').classList.remove('hidden');
    let myFund=Object.values(fundraisers).find(f=>f.userId==currentUser.id);
    let myDons=Object.values(donations).filter(d=>d.fundId==myFund?.id);
    let myProofs=Object.values(proofs).filter(p=>p.fundId==myFund?.id);
    let gross=myDons.reduce((a,b)=>a+b.amount,0); let platformFee=Math.round(gross*PLATFORM_PERCENT/100); let net=gross-platformFee;

    let section="";
    if(myFund&&myFund.status=="pending"){
      section=`<div class="card"><h3>Step 2: Pay ${SERVICE_FEE.toLocaleString()} UGX Activation</h3><div class="note"><b>Transparency:</b> We charge 9% platform fee. You receive 91%.</div><input id="proofText" placeholder="Payment Reference"><button onclick="submitProof('${myFund.id}','activation')">Submit Activation Proof</button><a href="${SUPPORT_WHATSAPP}" target="_blank"><button class="whatsapp">💬 Chat Support for Payment Issues</button></a></div>`;
    }
    if(myFund&&myFund.status=="approved"){
      const link=location.origin+location.pathname+"?fund="+myFund.id;
      section=`<div class="card"><h3>✅ LIVE</h3><input value="${link}" readonly><button onclick="navigator.clipboard.writeText('${link}')">Copy Link</button></div>
      <div class="card"><h3>📊 Earnings</h3><div class="breakdown"><p>Total Donated: <b>${gross.toLocaleString()} UGX</b></p><p>Yamba Muno 9% Fee: <b>-${platformFee.toLocaleString()} UGX</b></p><p>You Will Receive: <b>${net.toLocaleString()} UGX</b></p></div><h4>Donors:</h4>${myDons.map(d=>`<p>${d.name}: ${d.amount.toLocaleString()} UGX via ${d.method}</p>`).join('')||'<p>No donations</p>'}</div>
      <div class="card"><h3>📥 Donation Payment Proofs</h3><p>Private - Only you and admin can see</p>${myProofs.map(p=>`<div class="proof-item"><b>${p.donorName}</b> - ${p.amount.toLocaleString()} UGX via ${p.method}<br><b>Ref:</b> ${p.proof}<br><i>${new Date(p.date).toLocaleString()}</i></div>`).join('')||'<p>No proofs yet</p>'}</div>`;
    }

    document.getElementById('dashboard').innerHTML=`<div class="card"><h2>Welcome, ${currentUser.name}</h2><button class="danger" onclick="logout()">Logout</button></div>${!myFund?`<div class="card"><h3>Step 1: Create Fundraiser</h3><input id="fundTitle" placeholder="Fundraising For"><input id="fundTarget" type="number" placeholder="Target UGX"><textarea id="fundStory"></textarea><input id="fundMedia" type="file" accept="image/*"><h4>Where to Send Donations</h4><select id="payoutMethod" onchange="showPayout()"><option value="">Select</option><option value="MTN">MTN</option><option value="Airtel">Airtel</option><option value="Bank">Bank</option></select><div id="payoutFields"></div>
    
    <div class="checkbox-group">
      <input type="checkbox" id="agreeTerms">
      <label for="agreeTerms"><b>I agree and authorize Yamba Muno</b> to collect donations on my behalf. I understand that Yamba Muno will deduct a 9% platform fee and send the remaining 91% to my chosen account. I confirm all information provided is true.</label>
    </div>

    <button onclick="saveFundraiser()">Save & Continue to Payment</button><a href="${SUPPORT_WHATSAPP}" target="_blank"><button class="whatsapp">💬 Customer Care: +256780420041</button></a></div>`:section}`;
  }
  window.showPayout=function(){const m=payoutMethod.value; payoutFields.innerHTML=m=="MTN"||m=="Airtel"?`<div style="display:flex"><div style="padding:12px;background:#eee">${m} +256</div><input id="payoutNumber" maxlength="9"></div><p style="font-size:12px">Must be registered in your name</p>`:m=="Bank"?`<input id="bankName" placeholder="Bank"><input id="bankHolder" placeholder="Account Name"><input id="bankAccount" placeholder="Account Number">`:"";}
  window.saveFundraiser=async function(){
    if(!document.getElementById('agreeTerms').checked) return alert("⚠️ You must agree to Yamba Muno collecting funds on your behalf to continue");
    const file=fundMedia.files[0];let media=""; if(file){media=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(file);});} 
    const id=Date.now().toString(); const m=payoutMethod.value; let pd=m=="Bank"?{bankName:bankName.value,bankHolder:bankHolder.value,bankAccount:bankAccount.value}:{number:formatPhone(payoutNumber.value)};
    await set(ref(db,'fundraisers/'+id),{id,userId:currentUser.id,title:fundTitle.value,target:+fundTarget.value,story:fundStory.value,media,payoutMethod:m,payoutDetails:pd,agreed:true,status:"pending",proof:""}); 
    alert("✅ Agreement Saved. Now pay activation fee"); loadAllData();
  }
  window.submitProof=async function(id,type){const proofText=type=="activation"?document.getElementById('proofText').value:document.getElementById('donorProof').value;
    if(!proofText)return alert("Enter proof");
    await set(ref(db,'proofs/'+Date.now()),{fundId:id,donorName:currentUser?.name||donorName.value,amount:+document.getElementById('donorAmount')?.value||0,method:document.getElementById('donateMethod')?.value||"Activation",proof:proofText,date:Date.now(),type});
    if(type=="activation") await update(ref(db,'fundraisers/'+id),{proof:proofText});
    alert("Proof Submitted to Admin & Fundraiser"); loadAllData();
  }

  window.showPublicPage=function(fid){const f=fundraisers[fid]; if(!f||f.status!="approved")return app.innerHTML="<div class='card'><h2>Not Found</h2></div>";
    let raised=Object.values(donations).filter(d=>d.fundId==f.id).reduce((a,b)=>a+b.amount,0); let pct=Math.min(100,Math.round(raised/f.target*100));
    app.innerHTML=`<div class="card"><h2>Fundraising for "${f.title}"</h2>${f.media?`<img src="${f.media}">`:""}<p>${f.story}</p><h3>Goal: ${f.target.toLocaleString()} UGX</h3><div class="progress"><div class="progress-bar" style="width:${pct}%">${pct}%</div></div>
    <div class="fee-box"><b>How it works:</b> 91% goes to ${users[f.userId].name}. 9% covers payment processing and platform operations by Yamba Muno.</div>
    <button class="donate" onclick="donateForm.classList.toggle('hidden')">💚 Donate to This Cause</button>
    <div id="donateForm" class="hidden"><input id="donorName" placeholder="Your Full Names"><input id="donorAmount" type="number" placeholder="Amount UGX">
      <h4>Choose Donation Method:</h4>
      <div class="method-grid">
        <button class="stripe" onclick="showStripePay('${f.title}','${users[f.userId].name}')">Stripe Card</button>
        <button class="mtn" onclick="showManualPay('MTN','${f.title}','${users[f.userId].name}')">MTN Money</button>
        <button class="airtel" onclick="showManualPay('Airtel','${f.title}','${users[f.userId].name}')">Airtel Money</button>
      </div>
      <div id="manualPayBox"></div>
    </div><a href="${SUPPORT_WHATSAPP}" target="_blank"><button class="whatsapp">💬 Questions? Chat Customer Care</button></a></div>`;
  }

  window.showStripePay=function(title,recipient){
    manualPayBox.innerHTML = `
    <div class="payment-box">
      <h3>Donate via Stripe - Card/International</h3>
      <p>Click below. After payment, come back and paste proof.</p>
      <button onclick="window.open('${STRIPE_LINK}','_blank')">Pay with Stripe</button>
      <input id="donateMethod" value="Stripe" type="hidden">
      <input id="donorProof" placeholder="Paste Stripe Transaction ID">
      <button onclick="processDonate('${title}')">I Have Paid - Submit Proof</button>
    </div>`;
  }

  window.showManualPay=function(method,title,recipient){
    const number = method=="MTN"?ADMIN_MTN:ADMIN_AIRTEL;
    manualPayBox.innerHTML = `
    <div class="payment-box">
      <h3>Send ${method} Money To:</h3>
      <h2 style="color:#006400">${number}</h2>
      <p><b>Account Name:</b> ${ADMIN_NAME}</p>
      <p><b>IMPORTANT:</b> In "Reason/Reference" write:</p>
      <div style="background:white;padding:10px;border-radius:5px"><b>Donation to ${title} - For ${recipient}</b></div>
      <input id="donateMethod" value="${method}" type="hidden">
      <input id="donorProof" placeholder="Paste Payment Reference / Transaction ID">
      <button onclick="processDonate('${title}')">I Have Sent Money - Submit Proof</button>
    </div>`;
  }

  window.processDonate=async function(title){
    const name=donorName.value; const amt=+donorAmount.value; const proof=donorProof.value; const method=donateMethod.value;
    if(!name||!amt||!proof)return alert("Fill all fields");
    const fid=Object.values(fundraisers).find(f=>f.title==title).id;
    await set(ref(db,'proofs/'+Date.now()),{fundId:fid,donorName:name,amount:amt,method,proof,date:Date.now(),type:"donation"});
    app.innerHTML=`<div class="card" style="background:#e8f5e9"><h2>🙏 THANK YOU ${name}!</h2><p>Your ${method} donation of ${amt.toLocaleString()} UGX has been recorded.</p><p>Admin and ${users[fundraisers[fid].userId].name} will verify payment and update progress.</p><a href="${SUPPORT_WHATSAPP}" target="_blank"><button class="whatsapp">💬 Need Receipt? Chat Us</button></a></div>`;
  }

  window.showAdmin=function(){
    document.getElementById('app').classList.add('hidden');document.getElementById('dashboard').classList.add('hidden');document.getElementById('admin').classList.remove('hidden');
    let html=`<h2>🔒 Admin Dashboard - ${ADMIN_NAME}</h2>`;
    html+=`<div class="card"><h3>Receiving Numbers</h3><p><b>MTN:</b> ${ADMIN_MTN}</p><p><b>Airtel:</b> ${ADMIN_AIRTEL}</p><p><b>Account Name:</b> ${ADMIN_NAME}</p><a href="${SUPPORT_WHATSAPP}" target="_blank"><button class="whatsapp">💬 Admin Support</button></a></div>`;

    html+=`<h3>Pending Donation Proofs</h3>`;
    Object.values(proofs).filter(p=>p.type=="donation").forEach(p=>{
      let f=fundraisers[p.fundId]; let u=users[f.userId];
      html+=`<div class="proof-item"><h4>${p.donorName} → ${u.name}'s cause: ${f.title}</h4><p><b>Amount:</b> ${p.amount.toLocaleString()} UGX via ${p.method}</p><p><b>Ref:</b> ${p.proof}</p><button class="warn" onclick="approveDonation('${p.fundId}','${p.donorName}',${p.amount},'${p.method}')">Approve & Add to Total</button></div>`
    });

    html+=`<h3>Pending Activations</h3>`;
    Object.values(fundraisers).filter(f=>f.status=="pending"&&f.proof).forEach(f=>{let u=users[f.userId];
      html+=`<div class="card"><h4>${f.title} by ${u.name}</h4><p><b>Agreement:</b> ${f.agreed?"✅ Agreed":"❌ Not Agreed"}</p><p><b>Proof:</b> ${f.proof}</p><button onclick="approveFund('${f.id}')">Approve Fundraiser</button><button class="danger" onclick="deleteFund('${f.id}')">Revoke</button></div>`
    });
    document.getElementById('admin').innerHTML=html+`<button onclick="logout()">Logout</button>`;
  }
  window.approveDonation=async function(fid,name,amt,method){await set(ref(db,'donations/'+Date.now()),{fundId:fid,name,amount:amt,method,date:Date.now()}); alert("Donation Approved"); loadAllData();}
  window.approveFund=async function(id){await update(ref(db,'fundraisers/'+id),{status:"approved"});alert("Approved");loadAllData();}
  window.deleteFund=async function(id){if(confirm("Revoke?")){await remove(ref(db,'fundraisers/'+id));loadAllData();}}
  window.logout=function(){currentUser=null;sessionStorage.clear();location.reload();}
</script>
</body></html>
