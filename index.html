
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamba Muno - Fundraising Uganda</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
  body{background:#f5f7fa;color:#333}
  header{background:#006400;color:white;padding:12px 15px;text-align:center;position:relative;display:flex;align-items:center;justify-content:center}
  header h1{font-size:20px}
  header p{font-size:12px;opacity:0.9}
.admin-icon{position:absolute;left:15px;top:12px;background:none;border:none;font-size:24px;cursor:pointer;color:white}
.admin-banner{width:100%;max-height:250px;object-fit:cover;margin-bottom:15px;border-radius:10px}
.container{max-width:900px;margin:20px auto;padding:15px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.phone-group{display:flex;gap:0;align-items:center;margin-bottom:8px}
.phone-group.prefix{padding:12px;border-radius:8px 0 0 8px;font-weight:bold;display:flex;align-items:center;gap:6px;background:#eee}
.phone-group input{border-radius:0 8px 8px 0;flex:1}
.label-mtn{color:#d4a000;font-weight:bold}
.label-airtel{color:#cc0000;font-weight:bold}
  input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
  input.error{border:2px solid red;background:#ffe6e6}
.error-text{color:red;font-size:12px;margin-top:-5px;margin-bottom:5px}
  button{background:#006400;color:white;padding:14px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;width:100%;font-size:16px}
  button:hover{background:#004d00}
  button.danger{background:#cc0000}
  button.warn{background:#ff9800}
.btn-mtn{background:#ffcc00;color:#000;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-airtel{background:#e60000;color:white;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-bank{background:#0047ab;display:flex;align-items:center;justify-content:center;gap:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  img,video{max-width:100%;border-radius:10px;margin:10px 0}
.hidden{display:none}
.progress{height:20px;background:#eee;border-radius:10px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;background:#006400;text-align:center;color:white;font-size:12px;line-height:20px}
.message{padding:10px;background:#e8f5e9;border-left:4px solid #006400;margin:8px 0;border-radius:5px}
.donate-option{padding:15px;border:1px solid #ddd;border-radius:10px;margin:10px 0;text-align:left}
.donate-option h4{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.loading{text-align:center;padding:30px;color:#006400;font-weight:bold}
</style>
</head>
<body>
<header>
  <button class="admin-icon" onclick="showAdminLogin()">💚</button>
  <div>
    <h1>YAMBA MUNO</h1>
    <p>Help Ugandans Fundraise For Their Cause</p>
  </div>
</header>

<div class="container">
  <img id="adminBanner" class="admin-banner hidden">
  <div id="app"><div class="loading">Loading Yamba Muno...</div></div>
  <div id="dashboard" class="hidden"></div>
  <div id="admin" class="hidden"></div>
</div>

<script type="module">
  // 1. FIREBASE REALTIME DATABASE
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, update, remove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApNYOw-a9w7m51JCCOhP0EVRiVyx5JPrw",
    authDomain: "yamba-muno.firebaseapp.com",
    databaseURL: "https://yamba-muno-default-rtdb.firebaseio.com",
    projectId: "yamba-muno",
    storageBucket: "yamba-muno.firebasestorage.app",
    messagingSenderId: "507076898780",
    appId: "1:507076898780:web:c742dfcadbe635a568a919"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 2. ADMIN DETAILS
  const ADMIN_EMAIL_LOGIN = "admin@yambamuno.com";
  const ADMIN_PASS_LOGIN = "Kalungi123";
  const ADMIN_NAME_LOGIN = "Lubinga Alosious";
  const ADMIN_MTN = "+256788417769";
  const ADMIN_AIRTEL = "+256780420041";

  let currentUser = JSON.parse(sessionStorage.getItem('ym_current')) || null;
  let users = {}, fundraisers = {}, donations = {}, messages = {}, settings = {banner:""};

  // 3. LOAD ALL DATA
  async function loadAllData(){
    try{
      const usersSnap = await get(ref(db, 'users')); users = usersSnap.val() || {};
      const fundsSnap = await get(ref(db, 'fundraisers')); fundraisers = fundsSnap.val() || {};
      const donSnap = await get(ref(db, 'donations')); donations = donSnap.val() || {};
      const msgSnap = await get(ref(db, 'messages')); messages = msgSnap.val() || {};
      const settingsSnap = await get(ref(db, 'settings')); settings = settingsSnap.val() || {banner:""};

      if(settings.banner){ document.getElementById('adminBanner').src = settings.banner; document.getElementById('adminBanner').classList.remove('hidden'); }

      const urlParams = new URLSearchParams(window.location.search);
      if(urlParams.has('fund')){ showPublicPage(urlParams.get('fund')); }
      else if(currentUser){ currentUser.id === "admin"? showAdmin() : showDashboard(); }
      else{ showAuthPage(); }
    }catch(e){
      document.getElementById('app').innerHTML = `<div class="card"><h2>Firebase Error</h2><p>${e.message}</p><p>Go to Firebase > Realtime DB > Rules > set to true</p></div>`
    }
  }
  loadAllData();

  function saveSession(user){ currentUser = user; sessionStorage.setItem('ym_current', JSON.stringify(user)); }

  function showAuthPage(){
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>Start Your Fundraiser</h2>
      <p style="font-size:12px;margin-bottom:10px">Only for people who want to receive donations</p>
      <input id="authName" placeholder="Full Names">
      <div class="phone-group"><div class="prefix">+256</div><input id="authPhone" placeholder="788417769" type="tel" maxlength="9"></div>
      <input id="authPass" type="password" placeholder="Create Password">
      <button onclick="signup()">Create Account</button>
      <button onclick="login()" style="background:#555;margin-top:10px">Login</button>
    </div>
    `;
  }

  window.showAdminLogin = function(){
    const email = prompt("Admin Email:");
    const pass = prompt("Admin Password:");
    if(email==ADMIN_EMAIL_LOGIN && pass==ADMIN_PASS_LOGIN){
      saveSession({name:"Admin", id:"admin", email:ADMIN_EMAIL_LOGIN});
      showAdmin();
    }else{ alert("Wrong. Use: admin@yambamuno.com / Kalungi123"); }
  }

  function formatPhone(num){ return "+256" + num.replace(/\D/g,'').slice(-9); }

  window.signup = async function(){
    const name = document.getElementById('authName').value.trim();
    const phone = formatPhone(document.getElementById('authPhone').value);
    const pass = document.getElementById('authPass').value;
    if(!name || document.getElementById('authPhone').value.length!=9 ||!pass) return alert("Fill all fields. Phone = 9 digits");
    const userId = Date.now().toString();
    await set(ref(db, 'users/' + userId), {name, phone, pass, id:userId});
    alert("Account created. Login to start"); loadAllData();
  }

  window.login = async function(){
    const phone = formatPhone(document.getElementById('authPhone').value);
    const pass = document.getElementById('authPass').value;
    let user = Object.values(users).find(u=>u.phone==phone && u.pass==pass);
    if(!user) return alert("Wrong details");
    saveSession(user); showDashboard();
  }

  // FIXED: THIS NOW OPENS STEP 2
  window.showDashboard = function(){
    document.getElementById('app').classList.add('hidden');
    document.getElementById('admin').classList.add('hidden');
    let dash = document.getElementById('dashboard');
    dash.classList.remove('hidden');

    let myFund = Object.values(fundraisers).find(f=>f.userId==currentUser.id);
    let myMessages = Object.values(messages).filter(m=>m.to==currentUser.id);

    let inboxHTML = myMessages.length>0? `<div class="card"><h3>📩 Messages from Admin</h3>` +
      myMessages.map(m=>`<div class="message"><b>${m.date}</b><p>${m.text}</p></div>`).join('') + `</div>` : "";

    let paySection = "";
    if(myFund && myFund.status=="pending"){
      paySection = `<div class="card"><h3>Step 2: Activate Your Link - Pay 5000 UGX</h3>
        <p>Send to: <b>MTN ${ADMIN_MTN}</b> or <b>Airtel ${ADMIN_AIRTEL}</b><br>Names: <b>${ADMIN_NAME_LOGIN}</b></p>
        <input id="proofText" placeholder="Paste payment reference or screenshot link">
        <button onclick="submitProof('${myFund.id}')">Submit Payment Proof</button></div>`;
    }
    if(myFund && myFund.status=="approved"){
      const link = window.location.origin + window.location.pathname + "?fund=" + myFund.id;
      paySection = `<div class="card"><h3>✅ Your Link is Active - Share This</h3>
        <input value="${link}" readonly><button onclick="navigator.clipboard.writeText('${link}')">📋 Copy Link</button></div>`;
    }

    dash.innerHTML = `
      <div class="card"><h2>Welcome, ${currentUser.name}</h2><button class="danger" onclick="logout()" style="float:right;width:auto">Logout</button></div>
      ${inboxHTML}
      ${!myFund? `
      <div class="card"><h3>Step 1: Create Your Fundraiser</h3><div id="errorBox"></div>
        <input id="fundTitle" placeholder="What are you fundraising for?">
        <input id="fundTarget" type="number" placeholder="Target Amount UGX">
        <textarea id="fundStory" placeholder="Tell your story"></textarea>
        <h4>Your Bank Details</h4>
        <input id="bankName" placeholder="Bank Name">
        <input id="bankHolder" placeholder="Account Names">
        <input id="bankAccount" placeholder="Account Number">
        <h4>Your Mobile Money</h4>
        <div class="phone-group"><div class="prefix label-mtn">MTN +256</div><input id="mtnNumber" placeholder="788417769" maxlength="9"></div>
        <div class="phone-group"><div class="prefix label-airtel">AIRTEL +256</div><input id="airtelNumber" placeholder="780420041" maxlength="9"></div>
        <button onclick="saveFundraiser()">Save & Continue to Payment</button>
      </div>` : paySection }
    `;
  }

  window.saveFundraiser = async function(){
    const btn = event.target; btn.innerText = "Saving..."; btn.disabled = true;
    const fundId = Date.now().toString();
    await set(ref(db, 'fundraisers/' + fundId), {
      id:fundId, userId:currentUser.id,
      title:document.getElementById('fundTitle').value,
      target:parseInt(document.getElementById('fundTarget').value),
      story:document.getElementById('fundStory').value,
      bankName:document.getElementById('bankName').value,
      bankHolder:document.getElementById('bankHolder').value,
      bankAccount:document.getElementById('bankAccount').value,
      mtn:formatPhone(document.getElementById('mtnNumber').value),
      airtel:formatPhone(document.getElementById('airtelNumber').value),
      status:"pending", proof:""
    });
    alert("✅ Saved! Now go to Step 2: Upload Payment");
    loadAllData();
  }

  window.submitProof = async function(fundId){
    const proof = document.getElementById('proofText').value;
    if(!proof) return alert("Enter payment reference");
    await update(ref(db, 'fundraisers/' + fundId), {proof:proof});
    alert("Proof submitted. Wait for admin approval"); loadAllData();
  }

  window.showAdmin = async function(){
    document.getElementById('app').classList.add('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('admin').classList.remove('hidden');
    document.getElementById('admin').innerHTML = `<h2>🔒 Admin Panel</h2><div id="pendingFunds"></div><button onclick="logout()">Logout</button>`;

    let html = "";
    Object.values(fundraisers).filter(f=>f.status=="pending" && f.proof).forEach(f=>{
      let user = users[f.userId];
      html += `<div class="card"><h4>${f.title} by ${user.name}</h4><p>Proof: ${f.proof}</p>
      <button onclick="approveFund('${f.id}')">✅ Approve</button></div>`
    });
    document.getElementById('pendingFunds').innerHTML = html;
  }

  window.approveFund = async function(id){ await update(ref(db, 'fundraisers/' + id), {status:"approved"}); alert("Approved"); loadAllData(); }
  window.logout = function(){ currentUser=null; sessionStorage.clear(); location.reload(); }

  window.showPublicPage = function(fundId){
    const f = fundraisers[fundId];
    if(!f || f.status!="approved") return document.getElementById('app').innerHTML = "<h2>Not Found</h2>";
    let raised = Object.values(donations).filter(d=>d.fundId==f.id).reduce((a,b)=>a+b.amount,0);
    let percent = Math.min(100, Math.round(raised/f.target*100));
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('app').innerHTML = `<div class="card"><h2>${f.title}</h2><p>${f.story}</p><h4>Target: ${f.target.toLocaleString()} UGX</h4>
    <div class="progress"><div class="progress-bar" style="width:${percent}%">${percent}%</div></div></div>`;
  }
</script>
</body>
</html>
