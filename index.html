<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamba Muno - Fundraising Uganda</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
  body{background:#f5f7fa;color:#333}
  header{background:#006400;color:white;padding:15px;text-align:center}
  header h1{font-size:24px}
.admin-banner{width:100%;max-height:250px;object-fit:cover;margin-bottom:15px;border-radius:10px}
.container{max-width:900px;margin:20px auto;padding:20px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
  button{background:#006400;color:white;padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
  button:hover{background:#004d00}
  button.danger{background:#cc0000}
  button.warn{background:#ff9800}
.btn-mtn{background:#ffcc00;color:#000}
.btn-airtel{background:#e60000}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
  img,video{max-width:100%;border-radius:10px;margin:10px 0}
.hidden{display:none}
.progress{height:20px;background:#eee;border-radius:10px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;background:#006400;text-align:center;color:white;font-size:12px;line-height:20px}
.badge{padding:5px 10px;border-radius:20px;font-size:12px}
.badge.pending{background:orange;color:white}
.badge.approved{background:green;color:white}
.message{padding:10px;background:#e8f5e9;border-left:4px solid #006400;margin:8px 0;border-radius:5px}
</style>
</head>
<body>
<header>
  <h1>💚 YAMBA MUNO</h1>
  <p>Help Ugandans Fundraise For Their Cause</p>
</header>

<div class="container">
  <img id="adminBanner" class="admin-banner hidden">
  <div id="app"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('ym_users')) || [];
let fundraisers = JSON.parse(localStorage.getItem('ym_funds')) || [];
let donations = JSON.parse(localStorage.getItem('ym_donations')) || [];
let messages = JSON.parse(localStorage.getItem('ym_messages')) || []; // NEW
let settings = JSON.parse(localStorage.getItem('ym_settings')) || {banner:""};
let currentUser = JSON.parse(localStorage.getItem('ym_current')) || null;
const ADMIN_PHONE = "+256788417769";
const MTN_NUM = "+256788417769";
const AIRTEL_NUM = "+256780420041";
const ADMIN_NAME = "Lubinga Alosious";

if(settings.banner){ adminBanner.src = settings.banner; adminBanner.classList.remove('hidden'); }

function saveAll(){
  localStorage.setItem('ym_users', JSON.stringify(users));
  localStorage.setItem('ym_funds', JSON.stringify(fundraisers));
  localStorage.setItem('ym_donations', JSON.stringify(donations));
  localStorage.setItem('ym_messages', JSON.stringify(messages));
  localStorage.setItem('ym_settings', JSON.stringify(settings));
  localStorage.setItem('ym_current', JSON.stringify(currentUser));
}

const urlParams = new URLSearchParams(window.location.search);
if(urlParams.has('fund')){ showPublicPage(parseInt(urlParams.get('fund'))); }
else{ showAuthPage(); }

// 1. AUTH
function showAuthPage(){
  app.innerHTML = `
  <div class="card">
    <h2>Create Account or Login</h2>
    <input id="authName" placeholder="Full Names">
    <input id="authPhone" placeholder="Phone +2567...">
    <input id="authPass" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
    <button onclick="login()" style="background:#555">Login</button>
  </div>
  <div id="dashboard" class="hidden"></div>
  <div id="admin" class="hidden"></div>
  `;
}

function signup(){
  const name = authName.value; const phone = authPhone.value; const pass = authPass.value;
  if(!name ||!phone ||!pass) return alert("Fill all fields");
  if(users.find(u=>u.phone==phone)) return alert("User exists");
  users.push({name, phone, pass, id:Date.now()});
  saveAll(); alert("Account created. Login to start");
  login();
}
function login(){
  const phone = authPhone.value; const pass = authPass.value;
  let user = users.find(u=>u.phone==phone && u.pass==pass);
  if(!user) return alert("Wrong details");
  currentUser = user; saveAll();
  if(phone==ADMIN_PHONE) showAdmin();
  else showDashboard();
}

// 2. USER DASHBOARD + INBOX
function showDashboard(){
  dashboard.classList.remove('hidden');
  let myFund = fundraisers.find(f=>f.userId==currentUser.id);
  let myMessages = messages.filter(m=>m.to==currentUser.id);

  let inboxHTML = "";
  if(myMessages.length>0){
    inboxHTML = `<div class="card"><h3>📩 Messages from Admin</h3>`;
    myMessages.forEach(m=>{
      inboxHTML += `<div class="message"><b>${m.date}</b><p>${m.text}</p></div>`;
    });
    inboxHTML += `</div>`;
  }

  let paySection = "";
  if(myFund && myFund.status=="pending"){
    paySection = `
    <div class="card">
      <h3>Step 2: Activate Your Link - Pay 5000 UGX</h3>
      <p>Choose how to pay:</p>
      <div class="grid">
        <button class="btn-mtn" onclick="showPay('MTN')">📱 Pay with MTN</button>
        <button class="btn-airtel" onclick="showPay('Airtel')">📱 Pay with Airtel</button>
      </div>
      <div id="payDetails" class="hidden"></div>
      <input id="proofUpload" type="file" accept="image/*">
      <button onclick="submitProof(${myFund.id})">Upload Payment Proof</button>
    </div>`;
  }
  if(myFund && myFund.status=="approved"){
    const link = window.location.origin + window.location.pathname + "?fund=" + myFund.id;
    paySection = `<div class="card"><h3>✅ Your Link is Active</h3>
      <input value="${link}" readonly>
      <button onclick="navigator.clipboard.writeText('${link}')">📋 Copy Link</button>
    </div>`;
  }

  dashboard.innerHTML = `
    <div class="card">
      <h2>Welcome, ${currentUser.name}</h2>
    </div>
    ${inboxHTML}
    ${!myFund? `
    <div class="card">
      <h3>Step 1: Create Your Fundraiser</h3>
      <input id="fundTitle" placeholder="What are you fundraising for?">
      <input id="fundTarget" type="number" placeholder="Target Amount UGX e.g 2000000">
      <textarea id="fundStory" placeholder="Tell your story / problem"></textarea>
      <input id="fundMedia" type="file" accept="image/*,video/*">
      <h4>Your Bank Details</h4>
      <input id="bankName" placeholder="Bank Name">
      <input id="bankHolder" placeholder="Names Registered">
      <input id="swiftCode" placeholder="SWIFT Code">
      <h4>Your Mobile Money</h4>
      <input id="mtnNumber" placeholder="Your MTN Number">
      <input id="airtelNumber" placeholder="Your Airtel Number">
      <button onclick="saveFundraiser()">Save & Continue to Payment</button>
    </div>` : paySection }
  `;
}

function showPay(method){
  payDetails.classList.remove('hidden');
  payDetails.innerHTML = `
    <p><b>Send 5000 UGX to ${method}:</b></p>
    <h2>${method=='MTN'? MTN_NUM : AIRTEL_NUM}</h2>
    <p><b>Names: ${ADMIN_NAME}</b></p>
    <p>After sending, upload screenshot below</p>
  `;
}

function saveFundraiser(){
  const file = fundMedia.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    fundraisers.push({
      id:Date.now(), userId:currentUser.id, title:fundTitle.value, target:parseInt(fundTarget.value),
      story:fundStory.value, media:e.target.result, bankName:bankName.value, bankHolder:bankHolder.value,
      swift:swiftCode.value, mtn:mtnNumber.value, airtel:airtelNumber.value, status:"pending", proof:""
    });
    saveAll(); alert("Fundraiser saved. Now pay 5000 to activate"); showDashboard();
  }
  if(file) reader.readAsDataURL(file);
}

function submitProof(fundId){
  const file = proofUpload.files[0];
  if(!file) return alert("Upload payment screenshot");
  const reader = new FileReader();
  reader.onload = function(e){
    let fund = fundraisers.find(f=>f.id==fundId);
    fund.proof = e.target.result;
    saveAll(); alert("Proof submitted. Wait for admin approval"); showDashboard();
  }
  reader.readAsDataURL(file);
}

// 3. ADMIN PANEL WITH MESSAGE SYSTEM
function showAdmin(){
  admin.classList.remove('hidden');
  admin.innerHTML = `
  <h2>🔒 Admin Panel</h2>
  <div class="card">
    <h3>Upload Banner</h3>
    <input id="bannerUpload" type="file" accept="image/*">
    <button onclick="uploadBanner()">Upload Banner</button>
  </div>
  <h3>Pending Approvals</h3>
  <div id="pendingFunds"></div>
  <h3>All Users</h3>
  <div id="allUsers"></div>
  <button onclick="logout()">Logout</button>
  `;
  loadAdminData();
}

function uploadBanner(){
  const file = bannerUpload.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    settings.banner = e.target.result; saveAll();
    adminBanner.src = settings.banner; adminBanner.classList.remove('hidden');
  }
  if(file) reader.readAsDataURL(file);
}

function loadAdminData(){
  pendingFunds.innerHTML = "";
  fundraisers.filter(f=>f.status=="pending" && f.proof).forEach(f=>{
    let user = users.find(u=>u.id==f.userId);
    pendingFunds.innerHTML += `<div class="card">
      <h4>${f.title} by ${user.name} - ${user.phone}</h4>
      <img src="${f.proof}" style="max-height:200px">
      <div class="grid">
        <button onclick="approveFund(${f.id})">✅ Approve</button>
        <button class="warn" onclick="warnUser(${user.id}, ${f.id})">⚠️ Send Warning</button>
        <button class="danger" onclick="rejectFund(${f.id})">❌ Reject</button>
      </div>
    </div>`;
  });

  allUsers.innerHTML = "";
  users.filter(u=>u.phone!=ADMIN_PHONE).forEach(u=>{
    allUsers.innerHTML += `<div class="card">
      <p><b>${u.name}</b> - ${u.phone}</p>
      <textarea id="msg${u.id}" placeholder="Write warning message to ${u.name}"></textarea>
      <button class="warn" onclick="sendMessage(${u.id})">Send Message</button>
      <button class="danger" onclick="deleteUser(${u.id})">Delete User</button>
    </div>`;
  });
}

// NEW: SEND MESSAGE FUNCTION
function sendMessage(userId){
  const text = document.getElementById(`msg${userId}`).value;
  if(!text) return alert("Write a message first");
  messages.push({
    id:Date.now(), to:userId, from:"Admin", 
    text:text, 
    date:new Date().toLocaleString()
  });
  saveAll(); alert("Message sent to user");
  document.getElementById(`msg${userId}`).value = "";
}

function warnUser(userId, fundId){
  const warning = `Hello, We reviewed your payment proof and it looks fake/invalid. 
Please pay 5000 UGX to MTN ${MTN_NUM} or Airtel ${AIRTEL_NUM} in names of ${ADMIN_NAME} and upload real proof. 
If you don't pay within 24 hours, your account will be deleted.`;
  
  messages.push({
    id:Date.now(), to:userId, from:"Admin", 
    text:warning, 
    date:new Date().toLocaleString()
  });
  saveAll(); alert("Warning sent to user");
}

function approveFund(id){
  let fund = fundraisers.find(f=>f.id==id);
  fund.status = "approved";
  saveAll(); alert("Fundraiser Approved"); loadAdminData();
}
function rejectFund(id){
  let fund = fundraisers.find(f=>f.id==id);
  fund.status = "pending"; fund.proof = "";
  saveAll(); alert("Rejected"); loadAdminData();
}

function deleteUser(userId){
  if(!confirm("Delete this user and all their fundraisers?")) return;
  users = users.filter(u=>u.id!=userId);
  fundraisers = fundraisers.filter(f=>f.userId!=userId);
  messages = messages.filter(m=>m.to!=userId);
  saveAll(); loadAdminData();
}

// 4. PUBLIC PAGE
function showPublicPage(fundId){
  const f = fundraisers.find(x=>x.id==fundId && x.status=="approved");
  if(!f) return app.innerHTML = "<h2>Fundraiser Not Found or Not Approved Yet</h2>";

  let raised = donations.filter(d=>d.fundId==f.id).reduce((a,b)=>a+b.amount,0);
  let percent = Math.min(100, Math.round(raised/f.target*100));

  app.innerHTML = `
  <div class="card">
    <h2>${f.title}</h2>
    ${f.media.startsWith('data:video')? `<video controls src="${f.media}"></video>` : `<img src="${f.media}">`}
    <p>${f.story}</p>
    <h4>Target: ${f.target.toLocaleString()} UGX</h4>
    <div class="progress"><div class="progress-bar" style="width:${percent}%">${percent}%</div></div>
    <h4>Raised: ${raised.toLocaleString()} UGX</h4>

    <h3>Donate Now</h3>
    <input id="donorName" placeholder="Your Full Names">
    <input id="donorAmount" type="number" placeholder="Amount UGX">
    <div class="grid">
      <button class="btn-mtn" onclick="donate('MTN', ${f.id})">Donate MTN: ${f.mtn}</button>
      <button class="btn-airtel" onclick="donate('Airtel', ${f.id})">Donate Airtel: ${f.airtel}</button>
    </div>
    <button onclick="bank.classList.toggle('hidden')" style="background:#0047ab;margin-top:10px">Donate Bank</button>
    <div id="bank" class="hidden"><p>Bank: ${f.bankName}<br>Holder: ${f.bankHolder}<br>SWIFT: ${f.swift}</p></div>
  </div>`;
}

function donate(method, fundId){
  const name = donorName.value; const amount = parseInt(donorAmount.value);
  if(!name ||!amount) return alert("Enter name and amount");
  donations.push({fundId, name, amount, method, date:new Date()});
  saveAll();
  const f = fundraisers.find(x=>x.id==fundId);
  alert(`Send ${amount.toLocaleString()} UGX to ${method}: ${f[method.toLowerCase()]}`);
  showPublicPage(f.id);
}

function logout(){ currentUser=null; saveAll(); location.reload(); }
</script>
</body>
</html>
